<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museu de Conquistas - Steam Explorer</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="languages.js"></script>

    <style>
        :root {
            /* SaaS Emerald Palette */
            --primary-color: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --bg-dark: #020617;
            --bg-panel: rgba(15, 23, 42, 0.9);
            --bg-card: rgba(30, 41, 59, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --gold: #f59e0b;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --card-radius: 4px;
            /* SaaS Sharp */
            --btn-radius: 4px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        #canvas3d {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(5, 11, 20, 0.9) 0%, transparent 100%);
            z-index: 100;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: var(--btn-radius);
            cursor: pointer;
            font-family: var(--font-display);
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary-color);
            color: #fff;
        }

        .controls-panel {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-panel);
            padding: 12px;
            border-radius: var(--card-radius);
            border: 1px solid var(--glass-border);
            display: flex;
            gap: 8px;
            z-index: 100;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 10px 18px;
            border-radius: var(--btn-radius);
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--primary-color);
            color: #fff;
        }

        .control-btn.active {
            background: var(--primary-color);
            color: var(--bg-dark);
            font-weight: 700;
            border-color: var(--primary-color);
        }

        .stats-panel {
            position: fixed;
            right: 32px;
            top: 100px;
            background: var(--bg-panel);
            padding: 24px;
            border-radius: var(--card-radius);
            border: 1px solid var(--glass-border);
            min-width: 240px;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .stats-title {
            font-family: var(--font-display);
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: var(--primary-color);
            font-weight: 800;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 13px;
        }

        .stat-value {
            font-weight: 800;
            font-family: var(--font-display);
            color: #fff;
        }

        .trophy-info {
            position: fixed;
            left: 20px;
            bottom: 100px;
            background: var(--bg-panel);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 300px;
            z-index: 100;
            display: none;
        }

        .trophy-info.visible {
            display: block;
        }

        .trophy-game {
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .trophy-detail {
            font-size: 14px;
            color: var(--text-dim);
            margin: 5px 0;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .loading-screen.hidden {
            display: none;
        }

        .loading-text {
            font-family: var(--font-display);
            font-size: 24px;
            margin-top: 20px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 243, 255, 0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .instructions {
            position: fixed;
            left: 20px;
            top: 100px;
            background: var(--bg-panel);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            z-index: 100;
        }

        .instructions p {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .key {
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 8px;
            border-radius: 5px;
            font-family: monospace;
        }

        /* ========== RESPONSIVE DESIGN ========== */
        @media (max-width: 768px) {
            .ui-overlay {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }

            .main-nav {
                flex-wrap: wrap;
                justify-content: center;
                gap: 5px;
            }

            .nav-btn {
                padding: 6px 12px;
                font-size: 10px;
            }

            .nav-menu-dropdown {
                position: fixed;
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                border-radius: 20px 20px 0 0;
                min-width: 100%;
            }

            .logo {
                font-size: 16px;
            }

            .controls-panel {
                flex-wrap: wrap;
                justify-content: center;
                padding: 10px 15px;
                gap: 8px;
                bottom: 10px;
                left: 10px;
                right: 10px;
                transform: none;
            }

            .control-btn {
                padding: 8px 12px;
                font-size: 12px;
            }

            .stats-panel {
                left: 10px;
                top: 80px;
                padding: 10px 15px;
                font-size: 12px;
            }

            .instructions {
                display: none;
            }

            .trophy-info {
                font-size: 12px;
                padding: 15px;
                max-width: 90%;
            }
        }

        @media (max-width: 480px) {
            .control-btn {
                padding: 6px 10px;
                font-size: 10px;
            }

            .control-btn i {
                display: none;
            }

            .stats-panel {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-text">Carregando Museu...</div>
    </div>

    <canvas id="canvas3d"></canvas>

    <div class="ui-overlay">
        <a href="museum.html" class="logo"><i class="fas fa-landmark"></i> MUSEU 3D</a>
        <a href="index.html" class="nav-btn"
            style="background: rgba(0,0,0,0.5); border: 1px solid var(--primary-color);"><i
                class="fas fa-arrow-left"></i> Voltar</a>
    </div>

    <div class="instructions">
        <p><span class="key">W A S D</span> Mover</p>
        <p><span class="key">Mouse</span> Olhar</p>
        <p><span class="key">Click</span> Selecionar troféu</p>
    </div>

    <div class="stats-panel">
        <div class="stats-title"><i class="fas fa-chart-bar"></i> ESTATÍSTICAS</div>
        <div class="stat-row">
            <span class="stat-label">Platinas</span>
            <span class="stat-value" id="platCount">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Troféus Exibidos</span>
            <span class="stat-value" id="trophyCount">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Rarity Score</span>
            <span class="stat-value" id="rarityScore">0</span>
        </div>
    </div>

    <div class="trophy-info" id="trophyInfo">
        <div class="trophy-game" id="trophyGame">-</div>
        <div class="trophy-detail" id="trophyAchievements">Conquistas: -</div>
        <div class="trophy-detail" id="trophyHours">Horas: -</div>
        <div class="trophy-detail" id="trophyDate">Platinado em: -</div>
    </div>

    <div class="controls-panel">
        <button class="control-btn" onclick="resetCamera()">
            <i class="fas fa-home"></i> Reset Câmera
        </button>
        <button class="control-btn" onclick="toggleAutoRotate()">
            <i class="fas fa-sync"></i> Auto Rotação
        </button>
        <button class="control-btn" onclick="changeLayout('circle')">
            <i class="fas fa-circle"></i> Círculo
        </button>
        <button class="control-btn" onclick="changeLayout('grid')">
            <i class="fas fa-th"></i> Grid
        </button>
        <button class="control-btn" onclick="changeLayout('spiral')">
            <i class="fas fa-spinner"></i> Espiral
        </button>
    </div>

    <script>
        // Variáveis globais
        let scene, camera, renderer, controls;
        let trophies = [];
        let selectedTrophy = null;
        let autoRotate = false;
        let currentLayout = 'circle';

        // Movimento e Tempo
        const clock = new THREE.Clock();
        const keys = { w: false, a: false, s: false, d: false };
        let mouseX = 0, mouseY = 0;
        let isPointerLocked = false;

        // Dados de platinas - será carregado do localStorage
        let platinumGames = [];

        // Carregar dados da biblioteca
        function loadPlatinumGames() {
            try {
                // Tentar várias chaves possíveis de localStorage
                let games = null;

                // 1. Tentar chave padrão currentGames
                const savedGames = localStorage.getItem('currentGames');
                if (savedGames) {
                    games = JSON.parse(savedGames);
                }

                // 2. Se não encontrou, tentar buscar do IndexedDB/SteamCache via lastSteamId
                if (!games || games.length === 0) {
                    const steamId = localStorage.getItem('lastSteamId');
                    if (steamId) {
                        const steamGamesKey = `steamGames_${steamId}`;
                        const steamGamesData = localStorage.getItem(steamGamesKey);
                        if (steamGamesData) {
                            games = JSON.parse(steamGamesData);
                        }
                    }
                }

                // 3. Verificar também userStats para saber se tem platinas
                const userStats = localStorage.getItem('userStats');
                let platCount = 0;
                if (userStats) {
                    const stats = JSON.parse(userStats);
                    platCount = stats.totalPlatinum || 0;
                    console.log('📊 Stats indica', platCount, 'platinas');
                }

                if (games && games.length > 0) {
                    console.log('🎮 Jogos encontrados:', games.length);
                    // Filtrar apenas jogos platinados (100%)
                    platinumGames = games
                        .filter(g => g.percent === 100 || g.completion === 100)
                        .map(g => ({
                            name: g.name,
                            appid: g.appid,
                            achievements: g.total || g.unlocked || 0,
                            hours: g.playtime_hours || Math.round((g.playtime_forever || 0) / 60),
                            date: new Date().toISOString().split('T')[0],
                            rarity: Math.random() * 15 + 1
                        }));
                    console.log('🏆 Platinas filtradas:', platinumGames.length);
                }

                // Fallback se não houver platinas na biblioteca
                if (platinumGames.length === 0) {
                    platinumGames = [
                        { name: 'Nenhuma platina ainda!', appid: 0, achievements: 0, hours: 0, date: '-', rarity: 0 }
                    ];

                    // Mostrar mensagem
                    const msg = document.createElement('div');
                    msg.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg-panel);padding:30px;border-radius:15px;border:1px solid var(--primary-color);text-align:center;z-index:300;';
                    msg.innerHTML = `
                        <i class="fas fa-trophy" style="font-size:48px;color:var(--gold);margin-bottom:15px;display:block;"></i>
                        <h2 style="margin-bottom:10px;">Museu Vazio</h2>
                        <p style="color:var(--text-dim);">Carregue sua biblioteca no Steam Explorer primeiro<br>e complete 100% de algum jogo para ver suas platinas aqui!</p>
                        <a href="index.html" style="display:inline-block;margin-top:20px;padding:10px 25px;background:var(--primary-color);color:#000;text-decoration:none;border-radius:10px;font-weight:bold;">Ir para Biblioteca</a>
                    `;
                    document.body.appendChild(msg);
                }
            } catch (e) {
                console.error('Erro ao carregar platinas:', e);
                platinumGames = [
                    { name: 'Erro ao carregar', appid: 0, achievements: 0, hours: 0, date: '-', rarity: 0 }
                ];
            }
        }

        function init() {
            // Carregar dados primeiro
            loadPlatinumGames();

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            scene.fog = new THREE.Fog(0x020617, 20, 150);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 20);

            // Renderer
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;

            // Lights (SaaS Dramatic System)
            const ambientLight = new THREE.AmbientLight(0x0f172a, 0.4);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x10b981, 1.5, 100);
            pointLight.position.set(0, 20, 0);
            scene.add(pointLight);

            const spotLight = new THREE.SpotLight(0xf59e0b, 1.2);
            spotLight.position.set(0, 30, 0);
            spotLight.castShadow = true;
            scene.add(spotLight);

            // Environment (Skybox, Walls, Floor)
            createEnvironment();

            // Trophies
            createTrophies();

            // Event Listeners
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', onClick);
            window.addEventListener('resize', onWindowResize);

            // Hide loading
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 1500);

            // Update stats
            document.getElementById('platCount').innerText = platinumGames.length;
            document.getElementById('trophyCount').innerText = platinumGames.length;
            document.getElementById('rarityScore').innerText =
                Math.round(platinumGames.reduce((sum, g) => sum + g.rarity, 0) / platinumGames.length * 10) / 10;

            animate();
        }

        function createEnvironment() {
            // 1. Stars (Skybox)
            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            const starVertices = [];
            for (let i = 0; i < 5000; i++) {
                const x = (Math.random() - 0.5) * 1000;
                const y = (Math.random() - 0.5) * 1000;
                const z = (Math.random() - 0.5) * 1000;
                starVertices.push(x, y, z);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            // 2. Room (Walls & Ceiling)
            const roomSize = 80;
            const wallMaterial = new THREE.MeshStandardMaterial({
                color: 0x010409,
                roughness: 0.1,
                metalness: 0.8,
                emissive: 0x10b981,
                emissiveIntensity: 0.05
            });
            this.wallMaterial = wallMaterial; // Armazenar para animar pulsing

            // Walls
            const wallGeom = new THREE.PlaneGeometry(roomSize, roomSize);

            // Back Wall
            const wall1 = new THREE.Mesh(wallGeom, wallMaterial);
            wall1.position.z = -roomSize / 2;
            scene.add(wall1);

            // Left Wall
            const wall2 = new THREE.Mesh(wallGeom, wallMaterial);
            wall2.rotation.y = Math.PI / 2;
            wall2.position.x = -roomSize / 2;
            scene.add(wall2);

            // Right Wall
            const wall3 = new THREE.Mesh(wallGeom, wallMaterial);
            wall3.rotation.y = -Math.PI / 2;
            wall3.position.x = roomSize / 2;
            scene.add(wall3);

            // Ceiling
            const ceiling = new THREE.Mesh(wallGeom, wallMaterial);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = roomSize / 2;
            scene.add(ceiling);

            // 3. Floor (Emerald Reflective Marble)
            const gridHelper = new THREE.GridHelper(roomSize, 40, 0x10b981, 0x0f172a);
            gridHelper.position.y = -0.49;
            gridHelper.material.opacity = 0.1;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            const floorGeometry = new THREE.PlaneGeometry(roomSize, roomSize);
            const floorMaterial = new THREE.MeshStandardMaterial({
                color: 0x020617,
                roughness: 0.1,
                metalness: 0.4
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -0.5;
            floor.receiveShadow = true;
            scene.add(floor);

            // Neon Accents (Strips at corners)
            const stripGeom = new THREE.BoxGeometry(0.1, roomSize, 0.1);
            const stripMat = new THREE.MeshBasicMaterial({ color: 0x10b981 });
            this.neonAccents = [];

            [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(pos => {
                const strip = new THREE.Mesh(stripGeom, stripMat);
                strip.position.set(pos[0] * (roomSize / 2 - 0.1), roomSize / 2 - roomSize / 4, pos[1] * (roomSize / 2 - 0.1));
                scene.add(strip);
                this.neonAccents.push(strip);
            });

            this.starsMesh = stars; // Armazenar para animar rotação
        }

        function createTrophies() {
            trophies.forEach(t => scene.remove(t.mesh));
            trophies = [];

            platinumGames.forEach((game, i) => {
                const trophy = createTrophy(game, i);
                trophies.push(trophy);
                scene.add(trophy.mesh);
            });

            applyLayout(currentLayout);
        }

        function createTrophy(game, index) {
            // Grupo do troféu
            const group = new THREE.Group();

            // Base
            const baseGeometry = new THREE.CylinderGeometry(0.8, 1, 0.3, 6);
            const baseMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                metalness: 0.8,
                roughness: 0.2
            });
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            base.position.y = 0.15;
            group.add(base);

            // Pilar (Emerald Crystal)
            const pillarGeometry = new THREE.CylinderGeometry(0.3, 0.4, 1.5, 6);
            const pillarMaterial = new THREE.MeshStandardMaterial({
                color: 0x10b981,
                metalness: 0.9,
                roughness: 0.1,
                emissive: 0x064e3b,
                emissiveIntensity: 0.3
            });
            const pillar = new THREE.Mesh(pillarGeometry, pillarMaterial);
            pillar.position.y = 1;
            group.add(pillar);

            // Taça (High-End Gold)
            const cupGeometry = new THREE.SphereGeometry(0.65, 32, 24, 0, Math.PI * 2, 0, Math.PI / 2);
            const cupMaterial = new THREE.MeshStandardMaterial({
                color: 0xf59e0b,
                metalness: 1,
                roughness: 0.05,
                side: THREE.DoubleSide
            });
            const cup = new THREE.Mesh(cupGeometry, cupMaterial);
            cup.rotation.x = Math.PI;
            cup.position.y = 2.3;
            group.add(cup);

            // Borda da taça
            const rimGeometry = new THREE.TorusGeometry(0.6, 0.08, 8, 32);
            const rim = new THREE.Mesh(rimGeometry, pillarMaterial);
            rim.rotation.x = Math.PI / 2;
            rim.position.y = 2.2;
            group.add(rim);

            // Alças
            const handleGeometry = new THREE.TorusGeometry(0.35, 0.06, 8, 16, Math.PI);
            const leftHandle = new THREE.Mesh(handleGeometry, pillarMaterial);
            leftHandle.position.set(-0.8, 2, 0);
            leftHandle.rotation.z = -Math.PI / 2;
            group.add(leftHandle);

            const rightHandle = new THREE.Mesh(handleGeometry, pillarMaterial);
            rightHandle.position.set(0.8, 2, 0);
            rightHandle.rotation.z = Math.PI / 2;
            group.add(rightHandle);

            // Glow
            const glowGeometry = new THREE.SphereGeometry(1.2, 16, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xffd700,
                transparent: true,
                opacity: 0.1
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            glow.position.y = 1.8;
            group.add(glow);

            // Plataforma com luz
            const platformLight = new THREE.PointLight(0xffd700, 0.5, 5);
            platformLight.position.y = 0.5;
            group.add(platformLight);

            group.castShadow = true;

            return {
                mesh: group,
                data: game,
                index: index,
                originalY: 0
            };
        }

        function applyLayout(layout) {
            currentLayout = layout;
            const count = trophies.length;

            trophies.forEach((trophy, i) => {
                let x, z;

                switch (layout) {
                    case 'circle':
                        const angle = (i / count) * Math.PI * 2;
                        const radius = 12;
                        x = Math.cos(angle) * radius;
                        z = Math.sin(angle) * radius;
                        break;

                    case 'grid':
                        const cols = Math.ceil(Math.sqrt(count));
                        const row = Math.floor(i / cols);
                        const col = i % cols;
                        x = (col - cols / 2 + 0.5) * 4;
                        z = (row - Math.ceil(count / cols) / 2 + 0.5) * 4;
                        break;

                    case 'spiral':
                        const t = i / count;
                        const spiralRadius = 5 + t * 10;
                        const spiralAngle = t * Math.PI * 4;
                        x = Math.cos(spiralAngle) * spiralRadius;
                        z = Math.sin(spiralAngle) * spiralRadius;
                        break;
                }

                // Animação suave
                animateTrophy(trophy.mesh, x, z);
            });
        }

        function animateTrophy(mesh, targetX, targetZ) {
            const startX = mesh.position.x;
            const startZ = mesh.position.z;
            const duration = 1000;
            const startTime = Date.now();

            function update() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3); // ease out cubic

                mesh.position.x = startX + (targetX - startX) * eased;
                mesh.position.z = startZ + (targetZ - startZ) * eased;

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            update();
        }

        function onKeyDown(e) {
            keys[e.key.toLowerCase()] = true;
        }

        function onKeyUp(e) {
            keys[e.key.toLowerCase()] = false;
        }

        function onMouseMove(e) {
            if (!isPointerLocked) {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = (e.clientY / window.innerHeight) * 2 - 1;
            }
        }

        function onClick(e) {
            // Raycaster para detectar clique em troféu
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const meshes = trophies.map(t => t.mesh);
            const intersects = raycaster.intersectObjects(meshes, true);

            if (intersects.length > 0) {
                let clickedMesh = intersects[0].object;
                while (clickedMesh.parent && !trophies.find(t => t.mesh === clickedMesh)) {
                    clickedMesh = clickedMesh.parent;
                }

                const trophy = trophies.find(t => t.mesh === clickedMesh);
                if (trophy) {
                    selectTrophy(trophy);
                }
            } else {
                deselectTrophy();
            }
        }

        function selectTrophy(trophy) {
            // Desselecionar anterior
            if (selectedTrophy) {
                selectedTrophy.mesh.scale.set(1, 1, 1);
            }

            selectedTrophy = trophy;
            trophy.mesh.scale.set(1.2, 1.2, 1.2);

            // Mostrar info
            const info = document.getElementById('trophyInfo');
            document.getElementById('trophyGame').innerText = trophy.data.name;
            document.getElementById('trophyAchievements').innerText = `Conquistas: ${trophy.data.achievements}`;
            document.getElementById('trophyHours').innerText = `Horas: ${trophy.data.hours}h`;
            document.getElementById('trophyDate').innerText = `Platinado em: ${trophy.data.date}`;
            info.classList.add('visible');

            // Mover câmera
            const targetPos = trophy.mesh.position.clone();
            targetPos.z += 5;
            targetPos.y = 3;

            animateCamera(targetPos);
        }

        function deselectTrophy() {
            if (selectedTrophy) {
                selectedTrophy.mesh.scale.set(1, 1, 1);
                selectedTrophy = null;
            }
            document.getElementById('trophyInfo').classList.remove('visible');
        }

        function animateCamera(target) {
            const startPos = camera.position.clone();
            const duration = 800;
            const startTime = Date.now();

            function update() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);

                camera.position.lerpVectors(startPos, target, eased);

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            update();
        }

        function resetCamera() {
            deselectTrophy();
            animateCamera(new THREE.Vector3(0, 5, 20));
        }

        function toggleAutoRotate() {
            autoRotate = !autoRotate;
            document.querySelector('.control-btn:nth-child(2)').classList.toggle('active', autoRotate);
        }

        function changeLayout(layout) {
            applyLayout(layout);
            document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active'));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Movimento WASD suave (Independente de FPS)
            const moveSpeed = 12 * delta;
            const direction = new THREE.Vector3();

            camera.getWorldDirection(direction);
            direction.y = 0; // Travar no chão
            direction.normalize();

            const sideVector = new THREE.Vector3().crossVectors(direction, camera.up).normalize();

            if (keys.w) camera.position.addScaledVector(direction, moveSpeed);
            if (keys.s) camera.position.addScaledVector(direction, -moveSpeed);
            if (keys.a) camera.position.addScaledVector(sideVector, -moveSpeed);
            if (keys.d) camera.position.addScaledVector(sideVector, moveSpeed);

            // Rotação baseada no mouse
            if (!selectedTrophy) {
                camera.rotation.y = THREE.MathUtils.lerp(camera.rotation.y, -mouseX * 0.4, 0.05);
                camera.rotation.x = THREE.MathUtils.lerp(camera.rotation.x, -mouseY * 0.2, 0.05);
            }

            // Ambientação Viva
            if (window.starsMesh) {
                window.starsMesh.rotation.y += 0.005 * delta;
                window.starsMesh.material.opacity = 0.7 + Math.sin(time * 0.5) * 0.3;
                window.starsMesh.material.transparent = true;
            }

            // Pulsar Neon das paredes
            if (window.wallMaterial) {
                const pulse = 0.02 + Math.sin(time * 2) * 0.01;
                window.wallMaterial.emissiveIntensity = pulse;
            }

            // Cintilar Neon Accents
            if (window.neonAccents) {
                window.neonAccents.forEach((strip, i) => {
                    strip.material.opacity = 0.8 + Math.sin(time * 3 + i) * 0.2;
                    strip.material.transparent = true;
                });
            }

            // Auto rotação da cena
            if (autoRotate) {
                trophies.forEach(trophy => {
                    trophy.mesh.rotation.y += 0.5 * delta;
                });
            }

            // Animação hover dos troféus (Pulsar esmeralda)
            trophies.forEach((trophy, i) => {
                const hover = Math.sin(time * 1.5 + i) * 0.08;
                trophy.mesh.position.y = hover;

                // Pulsar luz da base
                const light = trophy.mesh.children.find(c => c instanceof THREE.PointLight);
                if (light) {
                    light.intensity = 0.6 + Math.sin(time * 2 + i) * 0.2;
                }
            });

            renderer.render(scene, camera);
        }

        // Inicializar
        init();
    </script>
</body>
